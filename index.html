<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="screen-orientation" content="landscape" />
    <title>Minewalker — Babylon.js</title>
    <meta
      name="description"
      content="Walk a miner through diggable rock. Classic minesweeper fields and an endless tunnel — headlamp on."
    />
    <style>
      html, body, #app { margin: 0; width: 100%; height: 100%; height: 100dvh; overflow: hidden; background: #0b1018; }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        color: rgba(232,238,248,0.7); font: 400 0.8rem/1.4 ui-monospace, monospace;
        letter-spacing: 0.08em; text-transform: uppercase; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="boot">Loading Minewalker…</div>
    <div id="app">
      <canvas id="renderCanvas" tabindex="0"></canvas>
      <div id="hud"></div>
      <div id="campaign"></div>
    </div>
    <script type="module">
      import '/src/main.ts'
      document.getElementById('boot')?.remove()
    </script>
  </body>
</html>
